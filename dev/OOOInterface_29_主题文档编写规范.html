<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-bind="pageTitle"></title>
    <link rel="stylesheet" href="style.css">
    <style>
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            background: transparent;
        }

        .doc-page {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 32px 100px;
        }

        .doc-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .doc-nav a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            padding: 7px 14px;
            border: 1px solid var(--bg-version-border);
            border-radius: 8px;
            background: var(--bg-version);
            transition: all 0.2s ease;
        }

        .doc-nav a:hover {
            color: var(--bg-ver-num);
            border-color: var(--bg-ver-num);
            background: rgba(0, 174, 0, 0.04);
            text-decoration: none;
        }

        .doc-nav a:active {
            transform: scale(0.97);
        }

        .doc-nav a svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .doc-brand {
            font-family: 'HMPro', sans-serif;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .doc-head {
            border-bottom: 2px solid var(--bg-ver-num);
            padding-bottom: 28px;
            margin-bottom: 36px;
        }

        .doc-head h1 {
            font-family: 'HMPro', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-heading);
            margin: 0 0 6px;
            letter-spacing: -0.5px;
        }

        .doc-head .doc-subtitle {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
        }

        .doc-meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--bg-version-border);
            border: 1px solid var(--bg-version-border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .doc-meta-item {
            background: var(--bg-version);
            padding: 14px 18px;
        }

        .doc-meta-label {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .doc-meta-value {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-heading);
        }

        .doc-meta-value.status-active {
            color: var(--bg-ver-num);
        }

        .doc-body {
            display: flex;
            gap: 0;
            border: 1px solid var(--bg-version-border);
            border-radius: 10px;
            overflow: hidden;
            min-height: 480px;
        }

        /* 立式标签栏 */
        .tab-sidebar {
            width: 200px;
            flex-shrink: 0;
            background: var(--bg-version);
            border-right: 1px solid var(--bg-version-border);
        }

        .tab-sidebar-title {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--bg-version-border);
        }

        .tab-sidebar-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: none;
            border: none;
            border-left: 3px solid transparent;
            padding: 13px 20px;
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
        }

        .tab-sidebar-btn:hover {
            background: rgba(0, 174, 0, 0.04);
            color: var(--text-heading);
        }

        .tab-sidebar-btn.active {
            background: rgba(0, 174, 0, 0.06);
            border-left-color: var(--bg-ver-num);
            color: var(--bg-ver-num);
            font-weight: 600;
        }

        .tab-sidebar-btn .s-num {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0.5;
            width: 18px;
            flex-shrink: 0;
        }

        .tab-sidebar-btn.active .s-num {
            color: var(--bg-ver-num);
            opacity: 1;
        }

        /* 内容区 */
        .tab-content {
            flex: 1;
            padding: 32px 36px;
            min-width: 0;
        }

        .version-card {
            background: transparent;
            border: 1px solid var(--bg-version-border);
            border-radius: 14px;
            padding: 18px 20px;
            margin: 16px 0 18px;
        }

        body.dark-theme .version-card {
            background: var(--bg-version);
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .version-card {
                background: var(--bg-version);
            }
        }

        .version-head {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .version-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-heading);
        }

        .version-subtitle {
            margin: 12px 0 6px;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-heading);
        }

        .ver-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(0, 174, 0, 0.12);
            border: 1px solid rgba(0, 174, 0, 0.22);
            color: var(--bg-ver-num);
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            box-shadow: none;
        }

        .version-card p,
        .version-card li {
            margin: 0 0 8px;
            color: var(--text-paragraph);
            line-height: 1.8;
            font-size: 0.92rem;
        }

        .version-card ul,
        .version-card ol {
            margin: 6px 0 0 20px;
            padding: 0;
        }

        .version-card li {
            margin-bottom: 6px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-head {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--bg-version-border);
        }

        .section-num {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--bg-ver-num);
            background: rgba(0, 174, 0, 0.08);
            border-radius: 4px;
            padding: 3px 8px;
            flex-shrink: 0;
        }

        .section-title {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-heading);
            margin: 0;
        }

        .section-body p {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.92rem;
            color: var(--text-paragraph);
            line-height: 1.9;
            margin: 0 0 14px;
        }

        .section-body ul,
        .section-body ol {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.92rem;
            color: var(--text-paragraph);
            line-height: 1.9;
            padding-left: 22px;
            margin: 8px 0 16px;
        }

        .section-body li {
            margin: 5px 0;
        }

        .section-body code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.84rem;
            background: var(--bg-version);
            border: 1px solid var(--bg-version-border);
            border-radius: 4px;
            padding: 2px 6px;
            color: var(--bg-ver-num);
        }

        body.dark-theme .section-body code {
            color: #00e676;
            background: rgba(0, 230, 118, 0.08);
            border-color: rgba(0, 230, 118, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .section-body code {
                color: #00e676;
                background: rgba(0, 230, 118, 0.08);
                border-color: rgba(0, 230, 118, 0.2);
            }
        }

        .section-body .code-block {
            margin: 12px 0;
            border: 1px solid var(--bg-version-border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-version);
        }

        .section-body .code-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: var(--bg-version);
            border-bottom: 1px solid var(--bg-version-border);
        }

        body.dark-theme .section-body .code-block-header {
            background: rgba(30, 30, 30, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .section-body .code-block-header {
                background: rgba(30, 30, 30, 0.8);
            }
        }

        .section-body .code-block-lang {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-body .code-block-actions {
            display: flex;
            gap: 6px;
        }

        .section-body .code-block-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            color: var(--text-muted);
            background: var(--bg-version);
            border: 1px solid var(--bg-version-border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            padding: 0;
        }

        body.dark-theme .section-body .code-block-btn {
            background: rgba(30, 30, 30, 0.6);
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .section-body .code-block-btn {
                background: rgba(30, 30, 30, 0.6);
            }
        }

        .section-body .code-block-btn:hover {
            color: var(--bg-ver-num);
            border-color: var(--bg-ver-num);
        }

        .section-body .code-block-btn:active {
            transform: scale(0.92);
        }

        .section-body .code-block-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .section-body .code-block-btn.copied {
            color: #2e7d32;
            border-color: #2e7d32;
            background: rgba(46, 125, 50, 0.08);
        }

        body.dark-theme .section-body .code-block-btn.copied {
            color: #4caf50;
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .section-body .code-block-btn.copied {
                color: #4caf50;
                border-color: #4caf50;
                background: rgba(76, 175, 80, 0.15);
            }
        }

        .section-body pre {
            background: transparent;
            padding: 14px 18px;
            overflow-x: auto;
            margin: 0;
            border: none;
            border-radius: 0;
        }

        .section-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.82rem;
            line-height: 1.7;
            color: var(--text-paragraph);
            white-space: pre;
            display: block;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        body.dark-theme .section-body pre code {
            color: var(--text-paragraph);
            background: none;
            border: none;
            padding: 0;
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .section-body pre code {
                color: var(--text-paragraph);
                background: none;
                border: none;
                padding: 0;
            }
        }

        .code-block.code-light {
            background: #ffffff !important;
            border-color: #e0e0e0 !important;
        }

        .code-block.code-light .code-block-header {
            background: #f5f5f5 !important;
            border-bottom-color: #e0e0e0 !important;
        }

        .code-block.code-light .code-block-lang {
            color: #888 !important;
        }

        .code-block.code-light .code-block-btn {
            color: #888 !important;
            background: #ffffff !important;
            border-color: #ddd !important;
        }

        .code-block.code-light .code-block-btn:hover {
            color: var(--bg-ver-num) !important;
            border-color: var(--bg-ver-num) !important;
        }

        .code-block.code-light pre {
            background: #ffffff !important;
        }

        .code-block.code-light pre code {
            color: #333 !important;
        }

        .code-block.code-dark {
            background: #1e1e1e !important;
            border-color: #333 !important;
        }

        .code-block.code-dark .code-block-header {
            background: #2a2a2a !important;
            border-bottom-color: #333 !important;
        }

        .code-block.code-dark .code-block-lang {
            color: #888 !important;
        }

        .code-block.code-dark .code-block-btn {
            color: #999 !important;
            background: #333 !important;
            border-color: #444 !important;
        }

        .code-block.code-dark .code-block-btn:hover {
            color: var(--bg-ver-num) !important;
            border-color: var(--bg-ver-num) !important;
        }

        .code-block.code-dark pre {
            background: #1e1e1e !important;
        }

        .code-block.code-dark pre code {
            color: #d4d4d4 !important;
        }

        .section-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.88rem;
        }

        .section-body table th,
        .section-body table td {
            padding: 10px 14px;
            text-align: left;
            border: 1px solid var(--bg-version-border);
            color: var(--text-paragraph);
        }

        .section-body table th {
            background: var(--bg-version);
            font-weight: 600;
            color: var(--text-heading);
        }

        .section-body table tbody tr:hover {
            background: rgba(0, 174, 0, 0.03);
        }

        body.dark-theme .section-body table th {
            background: rgba(30, 30, 30, 0.8);
        }

        body.dark-theme .section-body table tbody tr:hover {
            background: rgba(0, 174, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-theme) .section-body table th {
                background: rgba(30, 30, 30, 0.8);
            }

            body:not(.light-theme) .section-body table tbody tr:hover {
                background: rgba(0, 174, 0, 0.08);
            }
        }

        .doc-footer {
            border-top: 1px solid var(--bg-version-border);
            padding-top: 20px;
            margin-top: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .doc-footer span {
            font-family: 'Harmony', system-ui, sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 700px) {
            .doc-page {
                padding: 32px 16px 60px;
            }

            .doc-head h1 {
                font-size: 1.5rem;
            }

            .doc-meta {
                grid-template-columns: repeat(2, 1fr);
            }

            .doc-body {
                flex-direction: column;
                min-height: auto;
            }

            .tab-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--bg-version-border);
            }

            .tab-sidebar-title {
                display: none;
            }

            .tab-sidebar-btn {
                border-left: none;
                border-bottom: 3px solid transparent;
                padding: 11px 16px;
                justify-content: center;
            }

            .tab-sidebar-btn.active {
                border-left-color: transparent;
                border-bottom-color: var(--bg-ver-num);
            }

            .tab-content {
                padding: 24px 18px;
            }
        }
    </style>
</head>

<body>
    <div class="doc-page">
        <nav class="doc-nav">
            <a href="../index.html"><svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>返回</a>
            <span class="doc-brand" data-bind="pageBrand"></span>
        </nav>

        <header class="doc-head">
            <h1 data-bind="pageTitleMain"></h1>
            <p class="doc-subtitle" data-bind="pageSubtitle"></p>
        </header>

        <div class="doc-meta" id="docMeta">
            <div class="doc-meta-item">
                <div class="doc-meta-label">文档编号</div>
                <div class="doc-meta-value" data-bind="docNumber"></div>
            </div>
            <div class="doc-meta-item">
                <div class="doc-meta-label">版本</div>
                <div class="doc-meta-value" data-bind="version"></div>
            </div>
            <div class="doc-meta-item">
                <div class="doc-meta-label">发布日期</div>
                <div class="doc-meta-value" data-bind="date"></div>
            </div>
            <div class="doc-meta-item">
                <div class="doc-meta-label">状态</div>
                <div class="doc-meta-value status-active" data-bind="status"></div>
            </div>
        </div>

        <div class="doc-body">
            <nav class="tab-sidebar" id="tabNav">
                <div class="tab-sidebar-title">目录</div>
            </nav>

            <div class="tab-content" id="tabContent"></div>
        </div>

        <footer class="doc-footer">
            <span data-bind="footerLeft"></span>
            <span data-bind="footerRight"></span>
        </footer>
    </div>

    <script src="OOOInterface_29_主题文档编写规范.js"></script>
    <script>
        (function () {
            var meta = DOC_DATA.meta;
            var bindMap = {
                pageTitle: 'title',
                pageBrand: '.doc-brand',
                pageTitleMain: '.doc-head h1',
                pageSubtitle: '.doc-head .doc-subtitle',
                docNumber: '[data-bind="docNumber"]',
                version: '[data-bind="version"]',
                date: '[data-bind="date"]',
                status: '[data-bind="status"]',
                footerLeft: '.doc-footer span:nth-child(1)',
                footerRight: '.doc-footer span:nth-child(2)'
            };

            if (!meta.footerRight) {
                meta.footerRight = meta.docNumber + ' ' + meta.version + ' · ' + meta.date;
            }

            Object.keys(bindMap).forEach(function (key) {
                if (meta[key] === undefined) return;
                var el = document.querySelector(bindMap[key]);
                if (el) el.textContent = meta[key];
            });

            document.title = meta.pageTitle || document.title;

            var nav = document.getElementById('tabNav');
            var content = document.getElementById('tabContent');
            var sections = DOC_DATA.sections;

            sections.forEach(function (sec, i) {
                var num = String(i + 1).padStart(2, '0');

                var btn = document.createElement('button');
                btn.className = 'tab-sidebar-btn' + (i === 0 ? ' active' : '');
                btn.setAttribute('data-tab', i);
                btn.innerHTML = '<span class="s-num">' + num + '</span>' + sec.label;
                nav.appendChild(btn);

                var div = document.createElement('div');
                div.className = 'section' + (i === 0 ? ' active' : '');
                div.id = 'sec-' + i;
                div.innerHTML = '<div class="section-head"><span class="section-num">\u00a7' + (i + 1) + '</span><h2 class="section-title">' + sec.title + '</h2></div><div class="section-body">' + sec.content.join('') + '</div>';
                content.appendChild(div);
            });

            var btns = nav.querySelectorAll('.tab-sidebar-btn');
            var secs = content.querySelectorAll('.section');
            btns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var idx = this.getAttribute('data-tab');
                    btns.forEach(function (b) { b.classList.remove('active'); });
                    secs.forEach(function (s) { s.classList.remove('active'); });
                    this.classList.add('active');
                    document.getElementById('sec-' + idx).classList.add('active');
                    initCodeBlocks();
                });
            });

            function initCodeBlocks() {
                var pres = document.querySelectorAll('.section-body pre[data-lang]');
                pres.forEach(function (pre) {
                    if (pre.parentElement.classList.contains('code-block')) return;

                    var lang = pre.getAttribute('data-lang') || 'CODE';
                    var code = pre.querySelector('code');
                    var text = code ? code.textContent : pre.textContent;

                    var lines = text.split('\n');
                    var minIndent = Infinity;
                    lines.forEach(function (line) {
                        if (line.trim() === '') return;
                        var indent = line.match(/^(\s*)/)[1].length;
                        if (indent < minIndent) minIndent = indent;
                    });
                    if (minIndent === Infinity) minIndent = 0;
                    if (minIndent > 0) {
                        var dedentedLines = lines.map(function (line) {
                            return line.length >= minIndent ? line.substring(minIndent) : line;
                        });
                        code.textContent = dedentedLines.join('\n');
                    }

                    var wrapper = document.createElement('div');
                    wrapper.className = 'code-block';

                    var header = document.createElement('div');
                    header.className = 'code-block-header';

                    var langSpan = document.createElement('span');
                    langSpan.className = 'code-block-lang';
                    langSpan.textContent = lang;

                    var actions = document.createElement('div');
                    actions.className = 'code-block-actions';

                    var isDarkPage = document.body.classList.contains('dark-theme') ||
                        (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches && !document.body.classList.contains('light-theme'));

                    var themeBtn = document.createElement('button');
                    themeBtn.className = 'code-block-btn';
                    themeBtn.setAttribute('data-action', 'theme');
                    themeBtn.setAttribute('title', '深浅切换');
                    themeBtn.innerHTML = isDarkPage
                        ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
                        : '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
                    themeBtn.addEventListener('click', function () {
                        var block = this.closest('.code-block');
                        if (!block.classList.contains('code-light') && !block.classList.contains('code-dark')) {
                            block.classList.add('code-light');
                            this.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
                            this.setAttribute('title', '强制亮色');
                        } else if (block.classList.contains('code-light')) {
                            block.classList.remove('code-light');
                            block.classList.add('code-dark');
                            this.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
                            this.setAttribute('title', '强制暗色');
                        } else {
                            block.classList.remove('code-dark');
                            var darkPage = document.body.classList.contains('dark-theme') ||
                                (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches && !document.body.classList.contains('light-theme'));
                            this.innerHTML = darkPage
                                ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
                                : '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
                            this.setAttribute('title', '深浅切换');
                        }
                    });

                    var copyBtn = document.createElement('button');
                    copyBtn.className = 'code-block-btn';
                    copyBtn.setAttribute('data-action', 'copy');
                    copyBtn.setAttribute('title', '复制');
                    copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                    copyBtn.addEventListener('click', function () {
                        var block = this.closest('.code-block');
                        var codeEl = block.querySelector('code');
                        var textToCopy = codeEl ? codeEl.textContent : '';

                        var origHtml = this.innerHTML;
                        this.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
                        this.classList.add('copied');
                        var self = this;
                        setTimeout(function () {
                            self.innerHTML = origHtml;
                            self.classList.remove('copied');
                        }, 2000);

                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(textToCopy);
                        } else {
                            var ta = document.createElement('textarea');
                            ta.value = textToCopy;
                            ta.style.position = 'fixed';
                            ta.style.opacity = '0';
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            document.body.removeChild(ta);
                        }
                    });

                    actions.appendChild(themeBtn);
                    actions.appendChild(copyBtn);

                    header.appendChild(langSpan);
                    header.appendChild(actions);

                    wrapper.appendChild(header);
                    pre.parentElement.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);
                });
            }

            initCodeBlocks();
        })();
    </script>
</body>

</html>
