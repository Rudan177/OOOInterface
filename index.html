<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guide</title>
    <style>
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            background: transparent;
        }
    </style>
</head>
<style>
    @font-face {
        font-family: 'RUDAN';
        src: url('/font/RUDAN.otf');
    }

    @font-face {
        font-family: 'HMSC';
        src: url('/font/HarmonyOS_SansSC.ttf');
    }

    .decoration {
        position: fixed;
        z-index: -1;
        opacity: 1;
        color: #000000;
        font-size: 20px;
        font-weight: 900;
        font-family: 'HMSC', serif;
        margin-bottom: 100px;
        top: 1.8%;
        left: 0%;
        width: 100%;
        text-align: center;
    }

    .imgcontainer {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px;
        gap: 0;
    }

    figure {
        background: #ffffff10;
        backdrop-filter: blur(10px);
        margin: 0 -80px;
        padding: 20px 20px 5px 20px;
        border: 1px solid #ccc;
        border-radius: 30px;
        cursor: pointer;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
            margin 0.5s cubic-bezier(0.4, 0, 0.2, 1),
            border-color 0.3s ease,
            filter 0.5s ease;
        position: relative;
        transform: scale(0.85) rotate(-5deg);
        z-index: 1;
        filter: blur(0);
    }

    figure.blurred {
        filter: blur(8px);
    }

    img {
        width: auto;
        height: 50vh;
        border: 1px solid #ccc;
        border-radius: 24px;
    }

    img.narrow-img {
        width: 30vw;
        height: 50vh;
        object-fit: contain;
        background: white;
    }

    img:hover {
        border: 1px solid #00ae00;
    }

    a {
        text-decoration: none;
    }

    figcaption {
        font-size: 28px;
        text-align: center;
        text-decoration: none;
        font-family: 'HMSC';
        font-weight: Light;
        color: #000000;
    }

    iframe {
        height: 50vh;
        width: 24vw;
        border: none;
        border-radius: 24px;
    }

    .iframe-wrapper {
        position: relative;
        height: 50vh;
        width: 24vw;
        overflow: hidden;
    }

    .jump-btn {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 8px 32px;
        background: #00ae00;
        color: white;
        border-radius: 20px;
        text-decoration: none;
        font-size: 14px;
        font-family: 'HMSC';
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }

    .jump-btn:hover {
        background: #008c00;
        transform: translateX(-50%) scale(1.05);
    }

    html {
        overflow: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        background: linear-gradient(135deg, rgba(0, 174, 0, 0.1) 0%, rgba(16, 191, 144, 0.1) 100%),
            radial-gradient(circle at 20% 50%, rgba(0, 174, 0, 0.05) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(16, 191, 144, 0.05) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(0, 174, 0, 0.03) 0%, transparent 30%),
            radial-gradient(circle at 60% 70%, rgba(16, 191, 144, 0.03) 0%, transparent 30%);
        background-attachment: fixed;
    }

    @media (max-width: 1024px) {
        .imgcontainer {
            flex-wrap: wrap;
            gap: 10px;
        }

        figure {
            margin: 0;
            transform: scale(0.9) rotate(0deg);
        }

        img {
            height: 35vh;
        }

        iframe {
            height: 35vh;
            width: 60vw;
        }

        .iframe-wrapper {
            height: 35vh;
            width: 60vw;
        }
    }

    @media (max-width: 768px) {
        .imgcontainer {
            flex-direction: column;
            gap: 20px;
            padding: 50px 0;
        }

        figure {
            margin: 0 !important;
            transform: scale(1) rotate(0deg) !important;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        figure.expanded {
            transform: scale(1) rotate(0deg) !important;
            margin: 0 !important;
            z-index: 100 !important;
        }

        figure.blurred {
            filter: blur(8px) !important;
        }

        img {
            width: 80vw;
            height: auto;
        }

        img.narrow-img {
            width: 80vw;
            height: auto;
            background: white;
        }

        iframe {
            height: 40vh;
            width: 80vw;
        }

        .iframe-wrapper {
            height: 40vh;
            width: 80vw;
        }

        figcaption {
            font-size: 20px;
        }

        .decoration {
            margin-bottom: 200px;
            font-size: 20px;
        }
    }

    @media (prefers-color-scheme: dark) {
        body {
            background: linear-gradient(135deg, rgba(0, 100, 0, 0.15) 0%, rgba(10, 80, 60, 0.15) 100%),
                radial-gradient(circle at 20% 50%, rgba(0, 100, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(10, 80, 60, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 100, 0, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 60% 70%, rgba(10, 80, 60, 0.05) 0%, transparent 30%);
            background-color: #0a0a0a;
        }

        .decoration {
            color: #fff;
        }

        figcaption {
            color: #fff;
        }

        figure {
            border: 1px solid #444;
        }

        img {
            border: 1px solid #444;
        }
    }

    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #00000005;
        padding: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(100px);
        font-size: 14px;
        color: #000000;
        animation: fadeInUp 0.5s ease-out;
    }

    footer p {
        margin: 0;
        text-shadow: none;
        color: #000000;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        footer {
            font-size: 11px;
            padding: 8px;
        }

        footer p {
            font-size: 11px;
        }
    }

    @media (prefers-color-scheme: dark) {
        footer {
            color: rgba(255, 255, 255, 0.9);
        }

        footer p {
            color: #fff;
        }
    }
</style>

<body>
    <div class="decoration"><span style="font-family: 'RUDAN';">OOOInterface</span> 产品页</div>
    <div class="imgcontainer">
        <figure>
            <a href="../Interface/5.2.html" target="_blank">
                <img src="../Interface/现已发布.png" alt="OOOInterface LTS 5.2 现已发布！" width="500px">
                <figcaption>点击下载</figcaption>
            </a>
        </figure>
        <figure>
            <a href="../Interface/20260618.png" target="_blank">
                <img src="../Interface/20260618.png" alt="OOOInterface的最新通告" width="500px">
                <figcaption>点击查看</figcaption>
            </a>
        </figure>
        <figure>
            <div class="iframe-wrapper">
                <a href="../about/about.html" target="_blank" class="jump-btn">点击进入</a>
                <iframe src="../about/about.html" width="100%" height="500px" frameborder="0"></iframe>
            </div>
            <figcaption>点击查看</figcaption>
        </figure>
    </div>
    <script>
        // 强制隐藏滚动条
        (function () {
            var style = document.createElement('style');
            style.textContent = '::-webkit-scrollbar{width:0!important;height:0!important;display:none!important}*{scrollbar-width:none!important;-ms-overflow-style:none!important}';
            document.head.appendChild(style);
        })();

        // 实时检测是否有精细指针设备（鼠标）
        const mouseQuery = window.matchMedia('(any-pointer: fine)');
        let hasMouse = mouseQuery.matches;
        let isTouch = !hasMouse;

        // 监听鼠标连接/断开
        mouseQuery.addEventListener('change', (e) => {
            hasMouse = e.matches;
            isTouch = !hasMouse;
            initInteraction();
        });

        // 根据屏幕宽度设置初始状态
        const getInitialTransform = () => {
            const width = window.innerWidth;
            if (width <= 768) {
                return `scale(1) rotate(0deg)`;
            } else if (width <= 1024) {
                return `scale(0.9) rotate(0deg)`;
            } else {
                return `scale(0.85) rotate(-5deg)`;
            }
        };

        // 获取所有 figure 元素
        const getFigures = () => Array.from(document.querySelectorAll('.imgcontainer figure'));

        // 初始化交互逻辑
        const initInteraction = () => {
            const figures = getFigures();

            figures.forEach((item, index) => {
                // 移除所有事件监听器（通过克隆节点）
                const newItem = item.cloneNode(true);
                item.parentNode.replaceChild(newItem, item);

                newItem.style.transform = getInitialTransform();
                newItem.style.zIndex = 10 - index;

                if (!isTouch) {
                    // 鼠标设备：hover 展开，点击进入
                    newItem.addEventListener('mouseenter', () => {
                        const currentFigures = getFigures();
                        newItem.style.transform = `scale(1.05) rotate(0deg)`;
                        newItem.style.zIndex = 100;
                        currentFigures.forEach(other => {
                            if (other !== newItem) {
                                other.classList.add('blurred');
                            }
                        });
                    });
                    newItem.addEventListener('mouseleave', () => {
                        const currentFigures = getFigures();
                        newItem.style.transform = getInitialTransform();
                        newItem.style.zIndex = 10 - index;
                        currentFigures.forEach(other => {
                            other.classList.remove('blurred');
                        });
                    });
                } else {
                    // 触屏设备：点击展开，再点击跳转
                    newItem.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();

                        const currentFigures = getFigures();
                        const hasExpanded = document.querySelector('.imgcontainer figure.expanded');

                        if (newItem.classList.contains('expanded')) {
                            // 第二次点击同一个：跳转
                            const link = newItem.querySelector('a');
                            if (link) {
                                window.open(link.href, link.target);
                            }
                        } else if (hasExpanded) {
                            // 已经有其他卡片展开，点击其他卡片：退出所有模糊
                            currentFigures.forEach(other => {
                                other.classList.remove('expanded', 'blurred');
                                other.style.transform = getInitialTransform();
                            });
                        } else {
                            // 第一次点击：展开
                            newItem.classList.add('expanded');
                            newItem.style.transform = `scale(1) rotate(0deg)`;
                            currentFigures.forEach(other => {
                                if (other !== newItem) {
                                    other.classList.add('blurred');
                                } else {
                                    other.classList.remove('blurred');
                                }
                            });
                        }
                    });
                }
            });
        };

        initInteraction();

        // 触屏设备：点击其他区域退出模糊效果
        document.addEventListener('click', (e) => {
            if (!isTouch) return;
            if (!e.target.closest('.imgcontainer figure')) {
                const currentFigures = getFigures();
                currentFigures.forEach(other => {
                    other.classList.remove('expanded', 'blurred');
                    other.style.transform = getInitialTransform();
                });
            }
        });
    </script>
</body>
<footer>
    <p>如果您有任何问题，请联系wyjcrtu@proton.me</p>
</footer>

</html>
