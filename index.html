<!DOCTYPE html>

    <style>
        @font-face {
            font-family: 'HMPro';
            src: url('font/RUDAN.otf') format('opentype');
            font-style: normal;
            font-weight: 900;
            font-display: swap;
        }

        @keyframes ULTRA {
            0% {
                opacity: 0;
                font-size: 53px;
            }

            50% {
                opacity: 0.5;
                font-size: 52px;
            }

            90% {
                opacity: 0.9;
                font-size: 50.0001px;
            }

            100% {
                opacity: 1;
                font-size: 50px;
            }
        }

        @keyframes PRO {
            0% {
                opacity: 0;
                font-size: 19px;
            }

            50% {
                opacity: 0.5;
                font-size: 20px;
            }

            90% {
                opacity: 0.9;
                font-size: 21.9999px;
            }

            100% {
                opacity: 1;
                font-size: 22px;
            }
        }

        @keyframes IMG {
            0% {
                opacity: 0;
                width: 155px;
            }

            50% {
                opacity: 0.5;
                width: 152px;
            }

            90% {
                opacity: 0.9;
                width: 150.5px;
            }

            100% {
                opacity: 1;
                width: 150px;
            }
        }

        @keyframes kuangjia {
            0% {
                opacity: 0;
                border-radius: 100px;
            }

            50% {
                opacity: 0.5;
                border-radius: 40px;
            }

            75% {
                opacity: 0.8;
                border-radius: 18px;
            }

            85% {
                opacity: 0.9;
                border-radius: 14px;
            }

            90% {
                opacity: 0.95;
                border-radius: 13px;
            }

            100% {
                opacity: 1;
                border-radius: 12px;
            }
        }

        @keyframes lianjie {
            0% {
                color: #00AE00;
                background-color: transparent;
                border-radius: 60px;
                padding: 60px;
            }

            10% {
                color: #00AE0099;
                background-color: transparent;
                border-radius: 4px;
                padding: 0.5px 0.5px;
            }

            50% {
                color: #00AE0099;
                background-color: transparent;
                border-radius: 6px;
                padding: 6px 2px;
            }

            90% {
                color: #00AE0050;
                background-color: #00AE0050;
                border-radius: 10px;
                padding: 8px 4px;
            }

            100% {
                color: white;
                background-color: #00AE00;
                border-radius: 12px;
                padding: 10px 6px;
            }
        }

        body {
            font-family: serif, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(0, 174, 0, 0.1) 0%, rgba(16, 191, 144, 0.1) 100%),

                radial-gradient(circle at 80% 80%, rgba(16, 191, 144, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 174, 0, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 60% 70%, rgba(16, 191, 144, 0.03) 0%, transparent 30%);
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-container {
            width: 60%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .dakuang {
            width: 100%;
            margin-top: 50px;
            margin-bottom: 0;
            padding: 20px 0;
            border-radius: 12px;
            background: rgba(0, 174, 144, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            animation: kuangjia 0.5s ease-out 1;
        }

        .ultra {
            display: block;
            text-align: center;
            font-family: 'HMPro', serif, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 50px;
            font-weight: 800;
            color: #000000;
            padding: 5px 10px;
            animation: ULTRA 0.5s ease-out 1;
        }

        .pro {
            display: inline-block;
            text-align: center;
            font-family: serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 20px;
            color: #000000;
            padding: 5px 10px;
            animation: PRO 0.5s ease-out 1;
        }

        .dakuang img {
            display: block;
            margin: 0 auto;
            width: 150px;
            animation: IMG 0.5s ease-out 1;
        }

        .tishikuang {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.115);
            border: 2px solid #00000050;
            backdrop-filter: blur(10px);
            border-radius: 12px;

            text-align: center;
            align-items: center;

        .tishikuang p {

            margin-bottom: 0;
        }

        .tishikuang .button-row {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .linshilianjie {
            color: white;

            border-radius: 12px;

            padding: 10px 6px;
        }

        }

            text-align: center;
        }

        p {

        .decoration {
            position: fixed;
            z-index: -1;
            opacity: 1;
            color: gray;
            font-size: 20px;
            font-weight: 900;
            font-family: 'HMPro';
            margin-bottom: 50px;
            top: 1.8%;
            left: 0%;
            width: 100%;
            text-align: center;
        }

        .float-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00AE00;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 24px;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .float-btn:hover {
            transform: scale(1.05);
        }

        .float-btn svg {
            width: 20px;
            height: 20px;
        }

        .float-btn .icon-lock {
            width: 10px;
            height: 10px;
            fill: #ff4444;
        }

        .float-btn .icon-back-top {
            display: none;
        }

        .float-btn .theme-icons {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .float-btn.scrolled .icon-back-top {
            display: block;
        }

        .float-btn.scrolled .theme-icons {
            display: none;
        }

        .float-btn.scrolled.theme-mode .icon-back-top {
            display: none;
        }

        .float-btn.scrolled.theme-mode .theme-icons {
            display: flex;
        }

    <script>
        (function() {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile|CriOS/i.test(navigator.userAgent);
            var isSmallScreen = window.innerWidth <= 768;
            if (isMobile || isSmallScreen) {
                document.documentElement.classList.add('mobile');
                document.body.classList.add('mobile-device');
            }
            window.addEventListener('resize', function() {
                if (window.innerWidth <= 768) {
                    document.documentElement.classList.add('mobile');
                    document.body.classList.add('mobile-device');
                } else {
                    document.documentElement.classList.remove('mobile');
                    document.body.classList.remove('mobile-device');
                }
            });
        })();

        const floatBtn = document.querySelector('.float-btn');
        const iconLock = document.querySelector('.icon-lock');

        let hoverTimer = null;
        let isScrolled = false;
        let isThemeMode = false;
        let isLocked = localStorage.getItem('themeLocked') === 'true';
        let currentTheme = localStorage.getItem('currentTheme');

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                document.body.classList.remove('light-theme');
            } else {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
            }
        }

        function updateLockIcon() {
            iconLock.style.display = isLocked ? 'block' : 'none';
        }

        function updateButtonState() {
            if (isScrolled) {
                floatBtn.classList.add('scrolled');
                if (isThemeMode) {
                    floatBtn.classList.add('theme-mode');
                } else {
                    floatBtn.classList.remove('theme-mode');
                }
            } else {
                floatBtn.classList.remove('scrolled');
                floatBtn.classList.remove('theme-mode');
            }
        }

        if (isLocked && currentTheme) {
            applyTheme(currentTheme);
        } else if (!isLocked) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(prefersDark ? 'dark' : 'light');
        }
        updateLockIcon();

        floatBtn.addEventListener('mouseenter', function() {
            if (isScrolled) {
                hoverTimer = setTimeout(function() {
                    isThemeMode = true;
                    updateButtonState();
                }, 1000);
            }
        });

        floatBtn.addEventListener('mouseleave', function() {
            if (hoverTimer) {
                clearTimeout(hoverTimer);
                hoverTimer = null;
            }
            setTimeout(function() {
                if (!floatBtn.matches(':hover')) {
                    isThemeMode = false;
                    updateButtonState();
                }
            }, 100);
        });

        floatBtn.addEventListener('click', function(e) {
            if (isScrolled && isThemeMode) {
                e.preventDefault();
                const currentIsDark = document.body.classList.contains('dark-theme');
                
                if (currentIsDark) {
                    applyTheme('light');
                    if (isLocked) localStorage.setItem('currentTheme', 'light');
                } else {
                    applyTheme('dark');
                    if (isLocked) localStorage.setItem('currentTheme', 'dark');
                }
            } else if (isScrolled) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const currentIsDark = document.body.classList.contains('dark-theme');
                
                if (currentIsDark) {
                    applyTheme('light');
                    if (isLocked) localStorage.setItem('currentTheme', 'light');
                } else {
                    applyTheme('dark');
                    if (isLocked) localStorage.setItem('currentTheme', 'dark');
                }
            }
        });

        floatBtn.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            isLocked = !isLocked;
            localStorage.setItem('themeLocked', isLocked);
            
            if (isLocked) {
                const theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
                localStorage.setItem('currentTheme', theme);
            } else {
                localStorage.removeItem('currentTheme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'dark' : 'light');
            }
            updateLockIcon();
        });

        window.addEventListener('scroll', function() {
            if (window.scrollY > 100) {
                isScrolled = true;
            } else {
                isScrolled = false;
                isThemeMode = false;
            }
            updateButtonState();
        });
    </script>
</body>
</html>
