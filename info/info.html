<style>
    :root {
        --bg-color: rgba(255, 255, 255, 0.8);
        --text-color: #000;
        --border-color: #aaa;
        --box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        --close-color: #666;
        --close-hover: #000;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: rgba(30, 30, 30, 0.8);
            --text-color: #fff;
            --border-color: #555;
            --box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            --close-color: #999;
            --close-hover: #fff;
        }
    }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }

    .info-container {
        width: 100%;
        height: 100%;
        text-align: center;
        border: 1px solid var(--border-color);
        border-radius: 28px;
        backdrop-filter: blur(10px);
        padding: 0 12px;
        display: flex;
        align-items: center;
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: all 0.3s ease;
        box-sizing: border-box;
        position: relative;
    }

    .info-container::-webkit-scrollbar {
        display: none;
    }

    .info-container::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.1), transparent);
        border-radius: 0 0 28px 28px;
        pointer-events: none;
    }

    @media (prefers-color-scheme: dark) {
        .info-container::after {
            background: linear-gradient(to top, rgba(255, 255, 255, 0.1), transparent);
        }
    }

    .info-container h1 {
        font-size: 36px;
        text-align: left;
        margin: 0;
        margin-left: 8px;
        line-height: 40px;
        flex: 0 0 auto;
        border-right: 1px solid var(--border-color);
        padding-right: 8px;
    }

    .info-container .scrollable-content {
        flex: 1;
        overflow-x: auto;
        white-space: nowrap;
        scrollbar-width: none;
        -ms-overflow-style: none;
        margin: 0 8px;
    }

    .info-container .scrollable-content::-webkit-scrollbar {
        display: none;
    }

    .info-container p {
        font-size: 24px;
        margin: 0;
        line-height: 40px;
        text-align: left;
        white-space: nowrap;
    }

    .info-close-btn {
        background: none;
        border: none;
        font-size: 30px;
        cursor: pointer;
        color: var(--close-color);
        transition: color 0.3s;
        line-height: 40px;
        margin-left: 12px;
        margin-right: 8px;
        flex: 0 0 auto;
        padding: 0;
        position: relative;
    }

    .info-close-btn::before {
        content: '';
        position: absolute;
        left: -12px;
        top: 50%;
        transform: translateY(-50%);
        height: 80%;
        width: 1px;
        background-color: var(--border-color);
    }

    .info-close-btn:hover {
        color: var(--close-hover);
    }

    @media (max-width: 768px), (max-device-width: 768px) {
        .info-container {
            padding: 0 8px;
        }

        .info-container h1 {
            font-size: 28px;
            line-height: 35px;
            margin-left: 6px;
            border-right: 1px solid var(--border-color);
            padding-right: 6px;
        }

        .info-container p {
            font-size: 18px;
            line-height: 35px;
            flex: 0 0 auto;
        }

        .info-close-btn {
            font-size: 24px;
            line-height: 35px;
            margin-left: 9px;
            margin-right: 6px;
            padding: 0;
        }

        .info-close-btn::before {
            left: -9px;
        }
    }

    @media (max-width: 480px) {
        .info-container {
            padding: 0 6px;
        }

        .info-container h1 {
            font-size: 24px;
            line-height: 30px;
            margin-left: 4px;
            border-right: 1px solid var(--border-color);
            padding-right: 4px;
        }

        .info-container p {
            font-size: 16px;
            line-height: 30px;
            flex: 0 0 auto;
        }

        .info-close-btn {
            font-size: 20px;
            line-height: 30px;
            margin-left: 6px;
            margin-right: 4px;
            padding: 0;
        }

        .info-close-btn::before {
            left: -6px;
        }
    }
</style>

<div class="info-container">
    <h1>提示</h1>
    <div class="scrollable-content">
        <p>提示信息测试。啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊</p>
    </div>
    <button class="info-close-btn" onclick="closeInfo()">&times;</button>
</div>

<script>
    function closeInfo() {
        if (window.frameElement) {
            window.parent.postMessage('closeInfoIframe', '*');
            window.frameElement.style.display = 'none';
        } else {
            document.querySelector('.info-container').style.display = 'none';
        }
    }

    window.onload = function() {
        var h1Text = document.querySelector('.info-container h1').textContent.trim();
        var pText = document.querySelector('.info-container p').textContent.trim();
        if (h1Text === '' && pText === '') {
            if (window.frameElement) {
                window.frameElement.style.display = 'none';
            } else {
                document.querySelector('.info-container').style.display = 'none';
            }
        }

        // 添加鼠标滚轮左右滑动功能
        var container = document.querySelector('.scrollable-content');
        container.addEventListener('wheel', function(e) {
            e.preventDefault();
            // 同时考虑 deltaY 和 deltaX，确保滚轮和触控板都能正常工作
            container.scrollLeft += e.deltaY || e.deltaX;
        });
    };
</script>
