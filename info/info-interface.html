<style>
    :root {
        --bg-color: rgba(255, 255, 255, 0.8);
        --text-color: #000;
        --border-color: #aaa;
        --box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        --close-color: #666;
        --close-hover: #000;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: rgba(30, 30, 30, 0.8);
            --text-color: #fff;
            --border-color: #555;
            --box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            --close-color: #999;
            --close-hover: #fff;
        }
    }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }

    .info-container {
        width: 100%;
        height: 100%;
        text-align: center;
        border: 1px solid var(--border-color);
        border-radius: 28px;
        backdrop-filter: blur(10px);
        padding: 0 12px;
        display: flex;
        align-items: center;
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .info-container h1 {
        font-size: 36px;
        text-align: left;
        margin: 0;
        margin-left: 8px;
        line-height: 40px;
        flex: 0 0 auto;
    }

    .info-container p {
        font-size: 24px;
        margin: 0;
        line-height: 40px;
        border-left: 1px solid var(--border-color);
        padding-left: 8px;
        text-align: left;
        margin-left: 8px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .info-close-btn {
        background: none;
        border: none;
        font-size: 30px;
        cursor: pointer;
        color: var(--close-color);
        transition: color 0.3s;
        line-height: 40px;
        margin-left: 8px;
        margin-right: 8px;
        flex: 0 0 auto;
        padding: 0;
    }

    .info-close-btn:hover {
        color: var(--close-hover);
    }

    @media (max-width: 768px), (max-device-width: 768px) {
        .info-container {
            padding: 0 8px;
        }

        .info-container h1 {
            font-size: 28px;
            line-height: 35px;
            margin-left: 6px;
        }

        .info-container p {
            font-size: 18px;
            line-height: 35px;
            margin-left: 6px;
            padding-left: 6px;
        }

        .info-close-btn {
            font-size: 24px;
            line-height: 35px;
            margin-left: 6px;
            margin-right: 6px;
        }
    }

    @media (max-width: 480px) {
        .info-container {
            padding: 0 6px;
        }

        .info-container h1 {
            font-size: 24px;
            line-height: 30px;
            margin-left: 4px;
        }

        .info-container p {
            font-size: 16px;
            line-height: 30px;
            margin-left: 4px;
            padding-left: 4px;
        }

        .info-close-btn {
            font-size: 20px;
            line-height: 30px;
            margin-left: 4px;
            margin-right: 4px;
        }
    }
</style>

<div class="info-container">
    <h1>测试</h1>
    <p></p>
    <button class="info-close-btn" onclick="closeInfo()">&times;</button>
</div>

<script>
    function closeInfo() {
        if (window.frameElement) {
            window.frameElement.style.display = 'none';
        } else {
            document.querySelector('.info-container').style.display = 'none';
        }
    }

    window.onload = function() {
        var h1Text = document.querySelector('.info-container h1').textContent.trim();
        var pText = document.querySelector('.info-container p').textContent.trim();
        if (h1Text === '' && pText === '') {
            if (window.frameElement) {
                window.frameElement.style.display = 'none';
            } else {
                document.querySelector('.info-container').style.display = 'none';
            }
        }
    };
</script>
