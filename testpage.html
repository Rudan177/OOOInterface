<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <style>
        .kuangjia {
            color: #00ae00;
            padding-top: 10px;
            padding-bottom: 10px;
            background-color: #00AE00;
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            padding-right: 10px;
            border-radius: 28px;
        }
        .kuangjia h1 {
            color: #000;
            font-family: serif;
            font-size: 114px;
            line-height: 50%;
            font-weight: bold;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
        }

                /* Info iframe styles */
        .info-iframe-container {
            width: 80%;
            max-width: 600px;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            border: none;
            z-index: 999;
            height: 60px;
            overflow: hidden;
        }

        @media (max-width: 768px), (max-device-width: 768px) {
            .info-iframe-container {
                width: 90%;
                bottom: 80px;
                height: 55px;
            }
        }

        @media (max-width: 480px) {
            .info-iframe-container {
                width: 95%;
                bottom: 60px;
                height: 50px;
            }
        }
    </style>
    <body>
        <div class="kuangjia">
            <h1>测试页面</h1>
        </div>

        <!-- Info float window loaded via iframe -->
        <iframe src="info/info.html" class="info-iframe-container" frameborder="0" scrolling="no"></iframe>
    </body>
</html>
